# Grunt aliases
---
# Create a zipped artifact from a fresh build
'artifact':
  - 'clean:artifact'
  - 'shell:composer-install-production'
  - 'build'
  - 'copy:artifact'
  - 'compress:artifact'
  - 'shell:composer-install-dev'

'build':
  - 'build:i18n'
  - 'build:images'

# Update all versions except the readme Stable tag (for RC / trunk builds, so the
# wordpress.org listing keeps serving the last stable release).
'update-version-trunk':
  - 'update-version:pluginFile'
  - 'update-version:initializer'

'deploy:trunk':
  - 'update-version-trunk'
  - 'artifact'
  - 'wp_deploy:trunk'

'deploy:master':
  - 'update-version'
  - 'artifact'
  - 'wp_deploy:master'
